{% extends 'base.html' %}
{% block title %}Create Account — GYMprogrm{% endblock %}

{% block content %}
<div style="max-width:440px;margin:3rem auto;">
  <div class="card">
    <div style="text-align:center;margin-bottom:1.75rem;">
      <div style="font-size:2.5rem;margin-bottom:.5rem;">💪</div>
      <h1 style="font-size:1.5rem;font-weight:700;">Welcome, {{ student.name }}!</h1>
      <p style="color:var(--text-muted);font-size:.9rem;margin-top:.5rem;">Create your account to access your workout portal.</p>
    </div>

    {% if error %}
    <div class="alert alert-error" style="margin-bottom:1.25rem;">{{ error }}</div>
    {% endif %}

    <form method="post">
      {% csrf_token %}
      <div class="form-group">
        <label class="form-label" for="email">Email address</label>
        <input class="form-control" type="email" name="email" id="email" value="{{ student.email }}" required>
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input class="form-control" type="password" name="password" id="password" required minlength="8">
        <div class="form-hint">At least 8 characters.</div>
      </div>
      <div class="form-group">
        <label class="form-label" for="confirm_password">Confirm password</label>
        <input class="form-control" type="password" name="confirm_password" id="confirm_password" required>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;margin-top:.5rem;">
        Create Account &amp; Go to My Portal
      </button>
    </form>
  </div>
</div>
{% endblock %}
