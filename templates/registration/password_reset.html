{% load i18n %}
{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>{% trans "Reset Password" %} — GYMprogrm</title>
  <link rel="stylesheet" href="{% static 'css/base.css' %}">
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; padding:1rem; }
    .auth-card { width:100%; max-width:400px; background:var(--card); border:1px solid var(--border); border-radius:20px; padding:2rem 1.75rem; box-shadow:0 4px 24px rgba(0,0,0,.08); }
  </style>
</head>
<body>
<div class="auth-card">
  <div style="text-align:center;margin-bottom:1.5rem;">
    <div style="font-size:2.5rem;margin-bottom:.5rem;">🔑</div>
    <h1 style="font-size:1.4rem;font-weight:700;">{% trans "Forgot your password?" %}</h1>
    <p style="color:var(--text-muted);font-size:.88rem;margin-top:.4rem;">{% trans "Enter your email and we'll send you a reset link." %}</p>
  </div>
  <form method="post">
    {% csrf_token %}
    <div class="form-group">
      <label class="form-label">{% trans "Email address" %}</label>
      <input type="email" name="email" class="form-control" autofocus required>
    </div>
    <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:.75rem;">
      {% trans "Send Reset Link" %}
    </button>
  </form>
  <div style="text-align:center;margin-top:1.25rem;">
    <a href="/login/" style="font-size:.85rem;color:var(--primary);text-decoration:none;">← {% trans "Back to login" %}</a>
  </div>
</div>
</body>
</html>
