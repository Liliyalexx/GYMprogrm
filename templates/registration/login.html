{% load i18n %}
{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% trans "Login" %} — GymProgram</title>
  <link rel="stylesheet" href="{% static 'css/base.css' %}">
</head>
<body>
<div class="login-wrap">
  <div class="login-card">
    <div style="text-align:center;margin-bottom:1.5rem;overflow:hidden;max-height:160px;">
      <img src="{% static 'images/logo.png' %}" alt="GymProgram"
        style="width:min(320px,85vw);height:auto;display:inline-block;margin-top:0;">
    </div>
    <form method="post">
      {% csrf_token %}
      {% if form.errors %}
        <div class="alert alert-error">{% trans "Invalid username or password." %}</div>
      {% endif %}
      <div class="form-group">
        <label class="form-label">{% trans "Username" %}</label>
        <input type="text" name="username" class="form-control" autofocus required>
      </div>
      <div class="form-group">
        <label class="form-label">{% trans "Password" %}</label>
        <input type="password" name="password" class="form-control" required>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:.75rem;">
        {% trans "Sign In" %}
      </button>
    </form>
  </div>
</div>
</body>
</html>
