{% load i18n %}
{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>{% trans "Login" %} — GymProgram</title>
  <link rel="manifest" href="{% static 'manifest.json' %}">
  <meta name="theme-color" content="#2563eb">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <link rel="apple-touch-icon" href="{% static 'images/logo.png' %}">
  <link rel="stylesheet" href="{% static 'css/base.css' %}">
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; padding:1rem; }
    .auth-card { width:100%; max-width:400px; background:var(--card); border:1px solid var(--border); border-radius:20px; padding:2rem 1.75rem; box-shadow:0 4px 24px rgba(0,0,0,.08); }
    .auth-logo { text-align:center; margin-bottom:1.5rem; overflow:hidden; max-height:120px; }
    .auth-logo img { width:min(280px,80vw); height:auto; }
    .divider { display:flex; align-items:center; gap:.75rem; margin:1.25rem 0; color:var(--text-muted); font-size:.82rem; }
    .divider::before, .divider::after { content:''; flex:1; height:1px; background:var(--border); }
    .google-btn {
      display:flex; align-items:center; justify-content:center; gap:.65rem;
      width:100%; padding:.75rem; border:1.5px solid var(--border); border-radius:10px;
      background:#fff; color:var(--text); font-size:.95rem; font-weight:600;
      text-decoration:none; cursor:pointer; transition:border-color .15s, box-shadow .15s;
    }
    .google-btn:hover { border-color:#4285f4; box-shadow:0 0 0 3px rgba(66,133,244,.12); }
    .google-btn svg { width:20px; height:20px; flex-shrink:0; }
    .forgot-link { font-size:.83rem; color:var(--primary); text-decoration:none; }
    .forgot-link:hover { text-decoration:underline; }
  </style>
</head>
<body>
<div class="auth-card">
  <div class="auth-logo">
    <img src="{% static 'images/logo.png' %}" alt="GymProgram">
  </div>

  <!-- Google login -->
  <a href="/accounts/google/login/?next=/auth/redirect/" class="google-btn">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
      <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
      <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
      <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
    </svg>
    {% trans "Continue with Google" %}
  </a>
  <div class="divider">{% trans "or" %}</div>

  <form method="post">
    {% csrf_token %}
    {% if form.errors %}
      <div class="alert alert-error" style="margin-bottom:1rem;">{% trans "Invalid username or password." %}</div>
    {% endif %}
    <div class="form-group">
      <label class="form-label">{% trans "Username" %}</label>
      <input type="text" name="username" class="form-control" autofocus required>
    </div>
    <div class="form-group">
      <label class="form-label">{% trans "Password" %}</label>
      <input type="password" name="password" class="form-control" required>
    </div>
    <div style="text-align:right; margin-top:-.25rem; margin-bottom:1rem;">
      <a href="/password-reset/" class="forgot-link">{% trans "Forgot password?" %}</a>
    </div>
    <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:.75rem;">
      {% trans "Sign In" %}
    </button>
  </form>
</div>
</body>
</html>
